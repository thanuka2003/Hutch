<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z Pinger</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-title">
                <img src="icon48.png" alt="Logo" class="app-icon">
                <h1 class="neon-blue">Z PINGER</h1>
            </div>
            <div id="status-badge" class="status-disconnected">STATUS: DISCONNECTED</div>
            
            <div class="stats-container">
                <div class="stat-box">
                    <span class="stat-label">SENT</span>
                    <span id="stat-sent" class="stat-value">0</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-box">
                    <span class="stat-label">DROPS</span>
                    <span id="stat-drops" class="stat-value neon-red-text">0</span>
                </div>
            </div>
            <div class="last-ping-container">
                <span id="last-ping-time">Last Ping: --:--:--</span>
                <button id="reset-stats-btn">RESET</button>
            </div>
        </header>

        <main>
            <div class="pulse-container">
                <button id="toggle-btn" class="power-btn">
                    <svg viewBox="0 0 24 24" width="60" height="60" fill="currentColor">
                        <path d="M16.56,5.44L15.11,6.89C16.84,7.94 18,9.83 18,12A6,6 0 0,1 12,18A6,6 0 0,1 6,12C6,9.83 7.16,7.94 8.88,6.88L7.44,5.44C5.18,7.17 3.6,9.92 3.6,13.06C3.6,17.7 7.36,21.46 12,21.46C16.63,21.46 20.4,17.7 20.4,13.06C20.4,9.92 18.82,7.17 16.56,5.44M11,3H13V13H11V3Z" />
                    </svg>
                </button>
            </div>

            <div class="settings-area">
                <div class="setting-row">
                    <label>Target Network:</label>
                    <select id="network-select">
                        <option value="https://www.google.com">Google (Default)</option>
                        <option value="https://oneapp.hutch.lk">Hutch</option>
                        <option value="https://selfcare.dialog.lk">Dialog</option>
                        <option value="https://mas.mobitel.lk">Mobitel</option>
                        <option value="https://my.airtel.lk">Airtel</option>
                        <option value="custom">Custom URL</option>
                    </select>
                </div>

                <div id="custom-url-container" class="setting-row hidden">
                    <div class="input-group">
                        <input type="text" id="custom-url-input" placeholder="http://example.com">
                        <button id="save-url-btn">✓</button>
                    </div>
                </div>

                <div class="setting-row">
                    <label>Ping Interval:</label>
                    <select id="interval-select">
                        <option value="5">Every 5s</option>
                        <option value="10">Every 10s</option>
                        <option value="15" selected>Every 15s</option>
                        <option value="30">Every 30s</option>
                        <option value="60">Every 1 min</option>
                    </select>
                </div>
            </div>

            <div class="divider"></div>
            
            <div class="log-section">
                <div class="log-header">LOG CONSOLE</div>
                <div id="log-console" class="log-console">
                    <div class="empty-logs">No logs yet...</div>
                </div>
            </div>
        </main>
    </div>
    <script src="popup.js"></script>
</body>
</html>
